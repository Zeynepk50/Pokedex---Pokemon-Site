<div class="card hover-{{ primaryType }}" (click)="viewDetails()" role="button" tabindex="0"> <!-- //hover geçişi -->
  <button class="fav-btn" [class.is-fav]="isFavorite()" [class.animating]="isAnimating" (click)="toggleFavorite($event)"
    aria-label="Toggle Favorite"> <!-- animasyon -->
    <svg viewBox="0 0 24 24" width="24" height="24">
      <path
        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
    </svg>
  </button>
  <!-- <div class="card-id">{{ formattedId }}</div> -->
  <div class="card-image-wrap">
    <img class="card-image" [src]="imageUrl" [alt]="pokemon.name" loading="lazy" />
  </div>
  <div class="card-name">{{ pokemon.name }}</div>
  <div class="card-types">
    <span *ngFor="let t of pokemon.types" class="type-badge" [ngClass]="'type-' + t.type.name">{{ t.type.name }}</span>
  </div>
</div>
